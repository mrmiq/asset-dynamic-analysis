<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asset Dynamic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --red: #ef4444; --green: #22c55e; --bg: #000; }
        body { background-color: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; }
        
        .glass { 
            background: rgba(18, 18, 18, 0.8); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        #canvasContainer { flex: 1; position: relative; width: 100%; margin-top: 10px; }
        canvas { display: block; touch-action: none; width: 100%; height: 100%; }

        /* 双滑块样式逻辑 */
        .range-slider { position: relative; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 10px 0; }
        .range-slider .progress { position: absolute; height: 100%; background: #3b82f6; border-radius: 5px; }
        .range-input { position: relative; }
        .range-input input { position: absolute; top: -15px; width: 100%; height: 10px; background: none; pointer-events: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: #fff; pointer-events: auto; -webkit-appearance: none; cursor: pointer; border: 2px solid #3b82f6; }
        
        #progressRange { -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; width: 100%; }
        #progressRange::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
    </style>
</head>
<body class="flex flex-col">

    <!-- 欢迎与上传界面 -->
    <div id="welcome" class="fixed inset-0 z-50 flex items-center justify-center bg-black transition-opacity duration-500">
        <div class="text-center p-8 max-w-sm">
            <div class="mb-6 inline-flex p-6 bg-white/5 rounded-3xl border border-white/10">
                <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            </div>
            <h1 class="text-2xl font-black italic mb-2 tracking-tighter text-white">ASSET DYNAMIC</h1>
            <p class="text-zinc-500 text-[15px] mb-8 tracking-[0.3em] uppercase">数据分析引擎</p>
            <label class="block w-full bg-blue-600 py-4 rounded-2xl font-bold cursor-pointer hover:bg-blue-500 active:scale-95 transition-all text-center shadow-xl text-white">
                加载流水
                <input type="file" id="csvInputFirst" class="hidden csv-input-trigger" accept=".csv">
            </label>
        </div>
    </div>

    <!-- 主应用界面 -->
    <div id="app" class="hidden flex-1 flex flex-col opacity-0 transition-opacity duration-700">
        
        <!-- 响应式数据顶栏 -->
        <header class="p-4 md:p-6 grid grid-cols-1 md:grid-cols-4 gap-4 relative">
            <div class="glass p-3 rounded-2xl flex flex-col justify-center">
                <label class="w-full h-full flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 transition-colors rounded-xl">
				<span class="text-[15px] font-black text-blue-500 uppercase tracking-widest">当前日期</span>
                <span id="txtDate" class="text-lg font-mono font-black">----/--/--</span>
				</label>
            </div>
            
            <div class="glass p-3 rounded-2xl border-blue-500/20 flex flex-col justify-center items-center md:items-start relative col-span-1 md:col-span-2">
                <label class="w-full h-full flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 transition-colors rounded-xl">
				<div class="flex items-center gap-2 w-full justify-between">
                   <label class="w-full h-full flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 transition-colors rounded-xl">
					<span class="text-[15px] font-black text-blue-500 uppercase tracking-widest">实时资产净值</span>
                    </label>
                </div>
                <span id="txtWorth" class="text-3xl font-mono font-black tracking-tighter">¥ 0.00</span>
				<span id="percentChange" class="text-xl font-bold"></span>
				 </label>
            </div>

            <div class="glass p-3 rounded-2xl flex flex-col justify-center items-center">
                <label class="w-full h-full flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 transition-colors rounded-xl">
                    <span class="text-[15px] font-black text-blue-500 uppercase tracking-widest mb-1">导入数据</span>
                    <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    <input type="file" id="csvInputRepeat" class="hidden csv-input-trigger" accept=".csv">
                </label>
            </div>
        </header>

        <!-- 画布绘图区 -->
        <div id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
            <div id="tooltip" class="absolute pointer-events-none hidden glass px-3 py-2 rounded-lg border-white/20 text-[10px] font-mono z-30"></div>
        </div>

        <!-- 底部控制面板 -->
        <footer class="p-6 md:p-8 bg-zinc-900/40 border-t border-white/5 backdrop-blur-md">
            <div class="max-w-6xl mx-auto space-y-6">
                <!-- 时间段选择器 -->
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-[15px] font-bold text-zinc-400">时间段筛选：<span id="rangeDisplay" class="text-blue-400">全时段</span></span>
                        <span class="text-[15px] text-zinc-600 uppercase">滑动两端调整视角</span>
                    </div>
                    <div class="range-slider">
                        <div id="rangeProgress" class="progress" style="left:0%; right:0%;"></div>
                        <div class="range-input">
                            <input type="range" id="minRange" min="0" max="100" value="0">
                            <input type="range" id="maxRange" min="0" max="100" value="100">
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <button id="btnPlay" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all">
                        <svg id="playIcon" class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 20 20"><path d="M4.5 3L15.5 10L4.5 17V3Z"/></svg>
                    </button>
                    
                    <div class="flex-1 flex flex-col gap-3">
                        <input type="range" id="progressRange" value="0">
                        <div class="flex justify-between text-[15px] font-black text-zinc-500 tracking-tighter uppercase">
                            <span id="dateStart">START</span>
                            <span id="currentSelectionInfo" class="text-blue-500/50 text-[15px]">正在查看选定区间</span>
                            <span id="dateEnd">END</span>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        let rawHistory = [];    // 原始完整数据
        let viewHistory = [];   // 当前视角（筛选后）的数据
        let cursor = 0;         // 在 viewHistory 中的指针
        let isPlaying = false;
        let hoverIdx = -1;

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            draw();
        }
        window.addEventListener('resize', resize);

        // 处理文件导入
        document.querySelectorAll('.csv-input-trigger').forEach(input => {
            input.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    if(parse(ev.target.result)) {
                        initRange();
                        updateView();
                        const welcome = document.getElementById('welcome');
                        if(!welcome.classList.contains('pointer-events-none')) {
                            welcome.classList.add('opacity-0', 'pointer-events-none');
                            document.getElementById('app').classList.remove('hidden');
                            setTimeout(() => { document.getElementById('app').classList.add('opacity-100'); resize(); }, 50);
                        } else {
                            resize();
                        }
                    }
                    e.target.value = '';
                };
                reader.readAsText(file);
            });
        });

        function parse(csv) {
            const lines = csv.split('\n');
            const hIdx = lines.findIndex(l => l.includes('交易类型,日期'));
            if(hIdx === -1) return false;
            
            let accounts = {};
            let tmp = [];
            const rows = lines.slice(hIdx+1).map(r => r.trim()).filter(r => r).reverse();

            rows.forEach(row => {
                const c = row.split(',');
                if(c.length < 8) return;
                const type = c[0], date = c[1].split(' ')[0], cat = c[2], acc = c[5], 
                      amt = parseFloat(c[7].replace(/[",]/g,''))||0, note = c[10]||"";
                
                if(!accounts[acc]) accounts[acc] = 0;
                
                if(type === '支出') accounts[acc] -= amt;
                else if(type === '收入') accounts[acc] += amt;
                else if(type === '转账') {
                    accounts[acc] -= amt;
                    const target = (note.match(/转账到\s*(.+)/) || [])[1];
                    if(target) accounts[target.trim()] = (accounts[target.trim()] || 0) + amt;
                } else if(type === '余额变更' || cat === '初始余额') accounts[acc] = amt;

                const total = Object.values(accounts).reduce((a, b) => a + b, 0);
                if(tmp.length === 0 || tmp[tmp.length-1].date !== date) {
                    tmp.push({date, val: total});
                } else {
                    tmp[tmp.length-1].val = total;
                }
            });

            if(tmp.length === 0) return false;
            rawHistory = tmp;
            return true;
        }

        // 初始化范围滑块
        function initRange() {
            const minIn = document.getElementById('minRange');
            const maxIn = document.getElementById('maxRange');
            minIn.max = rawHistory.length - 1;
            maxIn.max = rawHistory.length - 1;
            minIn.value = 0;
            maxIn.value = rawHistory.length - 1;
            updateRangeUI();
        }

        function updateRangeUI() {
            const minIn = document.getElementById('minRange');
            const maxIn = document.getElementById('maxRange');
            const progress = document.getElementById('rangeProgress');
            
            // 确保不交叉
            if(parseInt(minIn.value) > parseInt(maxIn.value)) {
                let temp = minIn.value;
                minIn.value = maxIn.value;
                maxIn.value = temp;
            }

            const left = (minIn.value / minIn.max) * 100;
            const right = 100 - (maxIn.value / maxIn.max) * 100;
            progress.style.left = left + "%";
            progress.style.right = right + "%";

            document.getElementById('rangeDisplay').innerText = `${rawHistory[minIn.value].date} 至 ${rawHistory[maxIn.value].date}`;
        }

        // 根据筛选更新当前视图
        function updateView() {
            const startIdx = parseInt(document.getElementById('minRange').value);
            const endIdx = parseInt(document.getElementById('maxRange').value);
            viewHistory = rawHistory.slice(startIdx, endIdx + 1);
            
            cursor = viewHistory.length - 1;
            document.getElementById('progressRange').max = viewHistory.length - 1;
            document.getElementById('dateStart').innerText = viewHistory[0].date;
            document.getElementById('dateEnd').innerText = viewHistory[viewHistory.length-1].date;
            draw();
        }

        function draw() {
            if(viewHistory.length === 0) return;
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            const padX = 60 * dpr, padY = 80 * dpr;
            const pw = w - padX * 2, ph = h - padY * 2;

            const vals = viewHistory.map(d => d.val);
            const max = Math.max(...vals, 0) || 100;
            const min = Math.min(...vals, 0);
            const range = max - min;

            const getX = (i) => padX + (i / (viewHistory.length - 1)) * pw;
            const getY = (v) => h - padY - ((v - min) / (range || 1)) * ph;
            const zeroY = getY(0);

            // 基准线
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.setLineDash([5*dpr, 5*dpr]);
            ctx.moveTo(padX, zeroY); ctx.lineTo(w - padX, zeroY);
            ctx.stroke(); ctx.setLineDash([]);

            function drawSection(isPositive) {
                ctx.save();
                ctx.beginPath();
                if(isPositive) ctx.rect(0, 0, w, zeroY); else ctx.rect(0, zeroY, w, h - zeroY);
                ctx.clip();

                ctx.beginPath();
                ctx.lineWidth = 3 * dpr;
                ctx.strokeStyle = isPositive ? '#ef4444' : '#22c55e';
                ctx.lineJoin = 'round';
                
                for(let i=0; i <= cursor; i++) {
                    const x = getX(i), y = getY(viewHistory[i].val);
                    if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // 渐变填充
                ctx.lineTo(getX(cursor), zeroY); ctx.lineTo(getX(0), zeroY);
                const g = ctx.createLinearGradient(0, isPositive ? zeroY - 100*dpr : zeroY, 0, isPositive ? zeroY : zeroY + 100*dpr);
                if(isPositive) { g.addColorStop(0, 'rgba(239, 68, 68, 0.2)'); g.addColorStop(1, 'rgba(239, 68, 68, 0)'); }
                else { g.addColorStop(0, 'rgba(34, 197, 94, 0)'); g.addColorStop(1, 'rgba(34, 197, 94, 0.2)'); }
                ctx.fillStyle = g; ctx.fill();
                ctx.restore();
            }

            drawSection(true);
            drawSection(false);

            if (hoverIdx >= 0 && hoverIdx <= cursor) {
                const hX = getX(hoverIdx), hY = getY(viewHistory[hoverIdx].val);
                ctx.beginPath(); ctx.fillStyle = '#fff'; ctx.shadowBlur = 10 * dpr; ctx.shadowColor = '#fff';
                ctx.arc(hX, hY, 5 * dpr, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            }

            const p = viewHistory[cursor];
            document.getElementById('txtDate').innerText = p.date;
            document.getElementById('txtWorth').innerText = `¥ ${p.val.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            document.getElementById('txtWorth').style.color = p.val >= 0 ? '#ef4444' : '#22c55e';
            
            // 计算时段内涨跌幅
            const startVal = viewHistory[0].val;
            const diff = p.val - startVal;
            const pct = startVal !== 0 ? (diff / Math.abs(startVal) * 100).toFixed(2) : "0.00";
            document.getElementById('percentChange').innerText = `${diff >= 0 ? '↑' : '↓'} ${Math.abs(diff).toFixed(2)} (${pct}%)`;
            document.getElementById('percentChange').style.color = diff >= 0 ? '#ef4444' : '#22c55e';

            document.getElementById('progressRange').value = cursor;
        }

        // 交互逻辑
        function handleMove(e) {
            if(viewHistory.length === 0) return;
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            const x = cx - rect.left;
            const dpr = window.devicePixelRatio || 1;
            const padX = 60 * dpr, pw = canvas.width - padX * 2;
            const idx = Math.round(((x * dpr) - padX) / pw * (viewHistory.length - 1));

            if(idx >= 0 && idx <= cursor) {
                hoverIdx = idx;
                const p = viewHistory[idx];
                const tip = document.getElementById('tooltip');
                tip.style.display = 'block'; 
                tip.style.left = Math.min(window.innerWidth - 120, cx - rect.left + 15) + 'px';
                tip.style.top = (cy - rect.top - 50) + 'px';
                tip.innerText = `${p.date}\n¥${p.val.toLocaleString()}`;
                draw();
            } else { hideTip(); }
        }

        function hideTip() { hoverIdx = -1; document.getElementById('tooltip').style.display='none'; draw(); }
        container.addEventListener('mousemove', handleMove);
        container.addEventListener('touchstart', handleMove);
        container.addEventListener('mouseleave', hideTip);
        container.addEventListener('touchend', hideTip);

        // 自动演化
        function step() {
            if(!isPlaying) return;
            const stepSize = Math.max(1, Math.ceil(viewHistory.length / 300));
            cursor = Math.min(cursor + stepSize, viewHistory.length - 1);
            draw();
            if(cursor < viewHistory.length - 1) requestAnimationFrame(step);
            else toggle(false);
        }

        function toggle(st) {
            isPlaying = st !== undefined ? st : !isPlaying;
            const btn = document.getElementById('btnPlay');
            const icon = document.getElementById('playIcon');
            if(isPlaying) {
                if(cursor >= viewHistory.length - 1) cursor = 0;
                btn.className = "w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all";
                icon.innerHTML = '<path d="M6 4h4v12H6zM14 4h4v12h-4z"/>';
                step();
            } else {
                btn.className = "w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all";
                icon.innerHTML = '<path d="M4.5 3L15.5 10L4.5 17V3Z"/>';
            }
        }

        // 按钮与范围控制
        document.getElementById('btnPlay').onclick = () => toggle();
        document.getElementById('progressRange').oninput = (e) => {
            toggle(false);
            cursor = parseInt(e.target.value);
            draw();
        };

        // 时间范围滑块事件
        const rangeInputs = document.querySelectorAll('.range-input input');
        rangeInputs.forEach(input => {
            input.oninput = () => {
                toggle(false);
                updateRangeUI();
                updateView();
            };
        });
    </script>
</body>
</html>
